<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Party Pi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,0,200,0.03) 40px, rgba(255,0,200,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,255,0.03) 40px, rgba(0,255,255,0.03) 41px);
  }

  .card {
    background: #0f0f0f;
    border: 1px solid #ff00cc;
    border-radius: 4px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 0 30px rgba(255,0,200,0.2), inset 0 0 30px rgba(0,0,0,0.5);
  }

  .speakers-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
  }

  @media (min-width: 720px) {
    .card {
      max-width: 760px;
    }
    .speakers-grid {
      flex-direction: row;
      align-items: flex-start;
    }
    .speakers-grid .speaker {
      flex: 1;
      margin-top: 0;
    }
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 28px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ff00cc;
    text-shadow: 0 0 10px #ff00cc, 0 0 30px rgba(255,0,200,0.4);
    text-align: center;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 0.85rem;
  }

  .label { color: #666; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .dot.on { background: #00ffcc; box-shadow: 0 0 6px #00ffcc; }
  .dot.off { background: #333; }
  .value { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; color: #00ffcc; }

  .speaker {
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 16px 18px;
  }
  .speaker.stream-active {
    border-color: #ff00cc;
    box-shadow: 0 0 12px rgba(255,0,200,0.15);
  }

  .speaker-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .speaker-name {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
  }
  .speaker-status { font-size: 0.8rem; display: flex; align-items: center; }
  .conn-label { color: #555; }
  .conn-label.on { color: #00ffcc; }

  .stream-badge {
    font-size: 0.65rem;
    font-weight: 700;
    background: #ff00cc;
    color: #000;
    border-radius: 2px;
    padding: 1px 5px;
    vertical-align: middle;
    margin-left: 6px;
    letter-spacing: 0.05em;
    box-shadow: 0 0 6px #ff00cc;
  }

  .btn-connect {
    width: 100%;
    padding: 8px;
    border-radius: 2px;
    border: 1px solid #333;
    background: transparent;
    color: #00ffcc;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .btn-connect:hover:not(:disabled) {
    border-color: #00ffcc;
    box-shadow: 0 0 8px rgba(0,255,200,0.3);
  }
  .btn-connect:disabled { color: #333; border-color: #1a1a1a; cursor: default; }

  .vol-label {
    color: #555;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .vol-display {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #ff00cc;
    text-shadow: 0 0 10px rgba(255,0,200,0.6);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .vol-controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .vol-controls.down { margin-bottom: 6px; }

  .vol-btn {
    padding: 10px 4px;
    border-radius: 2px;
    border: 1px solid #333;
    background: transparent;
    color: #fff;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.1s;
    text-align: center;
  }
  .vol-btn.up { color: #00ffcc; border-color: #1a3a33; }
  .vol-btn.up:hover:not(:disabled) { background: #0a2a23; box-shadow: 0 0 8px rgba(0,255,200,0.2); border-color: #00ffcc; }
  .vol-btn.down { color: #ff6666; border-color: #3a1a1a; }
  .vol-btn.down:hover:not(:disabled) { background: #2a0a0a; box-shadow: 0 0 8px rgba(255,100,100,0.2); border-color: #ff6666; }
  .vol-btn:disabled { color: #333; border-color: #1a1a1a; cursor: default; }
  .vol-btn:active:not(:disabled) { opacity: 0.6; transform: scale(0.97); }

  .btn-abfahrt {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 2px;
    border: 2px solid #ff00cc;
    background: linear-gradient(135deg, #1a0011, #0a0a1a);
    color: #ff00cc;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    text-shadow: 0 0 8px #ff00cc;
    box-shadow: 0 0 15px rgba(255,0,200,0.3), inset 0 0 15px rgba(255,0,200,0.05);
    transition: all 0.15s;
  }
  .btn-abfahrt:hover:not(:disabled) {
    box-shadow: 0 0 25px rgba(255,0,200,0.6), inset 0 0 25px rgba(255,0,200,0.1);
    background: linear-gradient(135deg, #2a0018, #0f0f2a);
  }
  .btn-abfahrt:active:not(:disabled) { transform: scale(0.98); }
  .btn-abfahrt:disabled { opacity: 0.2; cursor: default; }

  .host-note {
    margin-top: 10px;
    font-size: 0.68rem;
    color: #444;
    line-height: 1.5;
    letter-spacing: 0.03em;
  }

  .actions { margin-top: 24px; }
  #btn-power {
    width: 100%;
    padding: 12px;
    border-radius: 2px;
    border: 1px solid #333;
    background: transparent;
    color: #666;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .player {
    margin-top: 20px;
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 16px 18px;
  }
  .player.linked { border-color: #1a3a1a; }
  .track-info {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 14px;
    min-height: 56px;
  }
  .album-art {
    width: 56px; height: 56px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
    background: #1a1a1a;
  }
  .track-text { flex: 1; overflow: hidden; }
  .track-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 0.78rem;
    color: #666;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .progress-bar {
    height: 2px;
    background: #222;
    border-radius: 1px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #ff00cc;
    box-shadow: 0 0 6px #ff00cc;
    transition: width 1s linear;
  }
  .player-controls {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .ctrl-btn {
    padding: 10px 18px;
    border-radius: 2px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 0.05em;
  }
  .ctrl-btn:hover { border-color: #ff00cc; color: #ff00cc; box-shadow: 0 0 8px rgba(255,0,200,0.2); }
  .ctrl-btn:active { opacity: 0.6; }
  .ctrl-btn.playing { color: #ff00cc; border-color: #ff00cc; }
  .spotify-link {
    display: block;
    margin-top: 10px;
    text-align: center;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-transform: uppercase;
  }
  .spotify-link:hover { color: #00ffcc; }
  #pin-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  #pin-screen h2 {
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: #ff00cc;
    text-shadow: 0 0 10px #ff00cc;
    text-transform: uppercase;
  }
  .pin-dots {
    display: flex;
    gap: 16px;
  }
  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #ff00cc;
    background: transparent;
    transition: background 0.1s;
  }
  .pin-dot.filled { background: #ff00cc; box-shadow: 0 0 8px #ff00cc; }
  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .pin-key {
    width: 72px; height: 72px;
    border-radius: 4px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    font-family: inherit;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.1s;
  }
  .pin-key:hover { border-color: #ff00cc; box-shadow: 0 0 8px rgba(255,0,200,0.3); }
  .pin-key:active { opacity: 0.6; transform: scale(0.95); }
  .pin-error { color: #ff4444; font-size: 0.8rem; letter-spacing: 0.1em; min-height: 1em; }
  #app { display: none; }
</style>
</head>
<body>
<div id="pin-screen">
  <h2>⚡ Party Pi ⚡</h2>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" data-n="1">1</button>
    <button class="pin-key" data-n="2">2</button>
    <button class="pin-key" data-n="3">3</button>
    <button class="pin-key" data-n="4">4</button>
    <button class="pin-key" data-n="5">5</button>
    <button class="pin-key" data-n="6">6</button>
    <button class="pin-key" data-n="7">7</button>
    <button class="pin-key" data-n="8">8</button>
    <button class="pin-key" data-n="9">9</button>
    <button class="pin-key" data-n="del" style="font-size:1rem">⌫</button>
    <button class="pin-key" data-n="0">0</button>
    <button class="pin-key" data-n="ok" style="font-size:0.9rem;color:#ff00cc">OK</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="app">
  <h1>⚡ PARTY PI ⚡</h1>
  <div class="status-row">
    <span class="label">Bluetooth</span>
    <span class="value" id="bt-status"><span class="dot off"></span>—</span>
  </div>

  <div class="speakers-grid">
  <div class="speaker stream-active" id="spk-366213">
    <div class="speaker-header">
      <span class="speaker-name">SOUNDBOKS #366213 <span class="stream-badge">▶ STREAM</span></span>
      <span class="speaker-status"><span class="dot off"></span><span class="conn-label">Getrennt</span></span>
    </div>
    <button class="btn-connect" disabled>Verbinden</button>
    <div class="vol-label">Lautstärke</div>
    <div class="vol-display">—</div>
    <div class="vol-controls up">
      <button class="vol-btn up btn-up" data-delta="1" disabled>+1%</button>
      <button class="vol-btn up btn-up" data-delta="5" disabled>+5%</button>
      <button class="vol-btn up btn-up" data-delta="10" disabled>+10%</button>
    </div>
    <div class="vol-controls down">
      <button class="vol-btn down btn-down" data-delta="1" disabled>−1%</button>
      <button class="vol-btn down btn-down" data-delta="5" disabled>−5%</button>
      <button class="vol-btn down btn-down" data-delta="10" disabled>−10%</button>
    </div>
    <button class="btn-abfahrt" data-key="366213" disabled>VOLLE PULLE! ABFAAAAHRT!</button>
    <div class="host-note">Im Host/Join-Modus steuert nur diese Box beide Lautstärken</div>
  </div>

  <div class="speaker" id="spk-366204">
    <div class="speaker-header">
      <span class="speaker-name">SOUNDBOKS #366204</span>
      <span class="speaker-status"><span class="dot off"></span><span class="conn-label">Getrennt</span></span>
    </div>
    <button class="btn-connect" disabled>Verbinden</button>
    <div class="vol-label">Lautstärke</div>
    <div class="vol-display">—</div>
    <div class="vol-controls up">
      <button class="vol-btn up btn-up" data-delta="1" disabled>+1%</button>
      <button class="vol-btn up btn-up" data-delta="5" disabled>+5%</button>
      <button class="vol-btn up btn-up" data-delta="10" disabled>+10%</button>
    </div>
    <div class="vol-controls down">
      <button class="vol-btn down btn-down" data-delta="1" disabled>−1%</button>
      <button class="vol-btn down btn-down" data-delta="5" disabled>−5%</button>
      <button class="vol-btn down btn-down" data-delta="10" disabled>−10%</button>
    </div>
    <button class="btn-abfahrt" data-key="366204" disabled>VOLLE PULLE! ABFAAAAHRT!</button>
  </div>
  </div>

  <div class="player" id="player">
    <div class="track-info">
      <img class="album-art" id="album-art" src="" alt="" style="display:none">
      <div class="track-text">
        <div class="track-name" id="track-name">—</div>
        <div class="track-artist" id="track-artist">—</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev">⏮</button>
      <button class="ctrl-btn" id="btn-playpause">▶</button>
      <button class="ctrl-btn" id="btn-next">⏭</button>
    </div>
    <a class="spotify-link" id="spotify-auth-link" href="/spotify/auth" style="display:none">Spotify verbinden →</a>
  </div>

  <div class="actions">
    <button id="btn-power">Bluetooth aus</button>
  </div>
</div>
</div>
<script>
  // PIN screen
  let pin = '';

  async function checkSession() {
    const r = await fetch('/api/status');
    if (r.ok) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchStatus();
      setInterval(fetchStatus, 5000);
      return true;
    }
    return false;
  }
  checkSession();
  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById(`d${i}`).className = 'pin-dot' + (i < pin.length ? ' filled' : '');
  }
  async function submitPin() {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });
    if (r.ok) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchStatus();
      setInterval(fetchStatus, 5000);
    } else {
      document.getElementById('pin-error').textContent = 'FALSCHER CODE';
      pin = '';
      updateDots();
      setTimeout(() => document.getElementById('pin-error').textContent = '', 1500);
    }
  }
  document.querySelectorAll('.pin-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const n = btn.dataset.n;
      if (n === 'del') { pin = pin.slice(0, -1); }
      else if (n === 'ok') { if (pin.length === 4) submitPin(); }
      else if (pin.length < 4) { pin += n; if (pin.length === 4) submitPin(); }
      updateDots();
    });
  });
  let powered = false;
  const currentVol = { '366213': 80, '366204': 80 };

  function setAllDisabled(el, disabled) {
    el.querySelectorAll('button.vol-btn, button.btn-abfahrt').forEach(b => b.disabled = disabled);
  }

  function initSpeaker(key) {
    const el = document.getElementById(`spk-${key}`);
    const btnConnect = el.querySelector('.btn-connect');

    btnConnect.addEventListener('click', async () => {
      btnConnect.disabled = true;
      await fetch(`/api/connect/${key}`, { method: 'POST' });
      setTimeout(fetchStatus, 3000);
    });

    async function changeVol(delta) {
      const newVol = Math.max(0, Math.min(100, currentVol[key] + delta));
      currentVol[key] = newVol;
      el.querySelector('.vol-display').textContent = newVol + '%';
      await fetch(`/api/volume/${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ volume: newVol })
      });
    }

    el.querySelectorAll('.btn-up').forEach(btn => {
      btn.addEventListener('click', () => changeVol(+parseInt(btn.dataset.delta)));
    });
    el.querySelectorAll('.btn-down').forEach(btn => {
      btn.addEventListener('click', () => changeVol(-parseInt(btn.dataset.delta)));
    });

    el.querySelector('.btn-abfahrt').addEventListener('click', async () => {
      currentVol[key] = 100;
      el.querySelector('.vol-display').textContent = '100%';
      await fetch(`/api/volume/${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ volume: 100 })
      });
    });
  }

  function updateSpeaker(key, data) {
    const el = document.getElementById(`spk-${key}`);
    const dot = el.querySelector('.speaker-status .dot');
    const label = el.querySelector('.conn-label');
    const btnConnect = el.querySelector('.btn-connect');
    const volDisplay = el.querySelector('.vol-display');

    dot.className = `dot ${data.connected ? 'on' : 'off'}`;
    label.textContent = data.connected ? 'Verbunden' : 'Getrennt';
    label.className = `conn-label ${data.connected ? 'on' : ''}`;
    btnConnect.disabled = !powered || data.connected;
    setAllDisabled(el, !data.connected);

    if (data.connected && data.volume !== null) {
      currentVol[key] = data.volume;
      volDisplay.textContent = data.volume + '%';
    } else if (!data.connected) {
      volDisplay.textContent = '—';
    }
  }

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      powered = d.powered;

      const btEl = document.getElementById('bt-status');
      btEl.innerHTML = `<span class="dot ${d.powered ? 'on' : 'off'}"></span>${d.powered ? 'AN' : 'AUS'}`;

      const btnPower = document.getElementById('btn-power');
      btnPower.textContent = d.powered ? 'Bluetooth aus' : 'Bluetooth an';
      btnPower.className = d.powered ? '' : 'off';

      for (const [key, data] of Object.entries(d.devices)) {
        updateSpeaker(key, data);
      }
    } catch(e) {}
  }

  document.getElementById('btn-power').addEventListener('click', async () => {
    await fetch(powered ? '/api/power/off' : '/api/power/on', { method: 'POST' });
    fetchStatus();
  });

  initSpeaker('366213');
  initSpeaker('366204');
  fetchStatus();
  setInterval(fetchStatus, 5000);

  // Player controls
  let isPlaying = false;

  async function fetchPlayer() {
    try {
      const r = await fetch('/api/player');
      const d = await r.json();
      const authLink = document.getElementById('spotify-auth-link');
      if (!d.linked) { authLink.style.display = 'block'; return; }
      authLink.style.display = 'none';
      document.getElementById('player').classList.add('linked');
      document.getElementById('track-name').textContent = d.track || '—';
      document.getElementById('track-artist').textContent = d.artist || '—';
      const art = document.getElementById('album-art');
      if (d.album_art) { art.src = d.album_art; art.style.display = 'block'; }
      else art.style.display = 'none';
      const pct = d.duration ? (d.progress / d.duration * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      isPlaying = d.playing;
      document.getElementById('btn-playpause').textContent = d.playing ? '⏸' : '▶';
      document.getElementById('btn-playpause').className = 'ctrl-btn' + (d.playing ? ' playing' : '');
    } catch(e) {}
  }

  document.getElementById('btn-prev').addEventListener('click', async () => {
    await fetch('/api/player/previous', { method: 'POST' });
    setTimeout(fetchPlayer, 500);
  });
  document.getElementById('btn-next').addEventListener('click', async () => {
    await fetch('/api/player/next', { method: 'POST' });
    setTimeout(fetchPlayer, 500);
  });
  document.getElementById('btn-playpause').addEventListener('click', async () => {
    await fetch(isPlaying ? '/api/player/pause' : '/api/player/play', { method: 'POST' });
    setTimeout(fetchPlayer, 300);
  });

  fetchPlayer();
  setInterval(fetchPlayer, 5000);
</script>
</body>
</html>
